<!DOCTYPE html>
<html>
<head><title>CrownStar Isometric Diagram</title></head>
<body style="background:#f0f3f8; padding:2rem;">
<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e8ecf5" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5d98a" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" rx="24" fill="rgba(255,255,255,0.5)" backdrop-filter="blur(10px)" style="backdrop-filter:blur(10px);" />

  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" font-size="28" font-weight="700" fill="#0a2e5c" font-family="PingFang SC, Microsoft YaHei, sans-serif">◆ 平台架构全景</text>

  <!-- Isometric base grid (simplified) -->
  <!-- Layer 1: Frontend (UI) -->
  <g transform="translate(150, 120)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="url(#glass)" stroke="#0a2e5c" stroke-width="1" filter="url(#shadow)"/>
    <text x="100" y="38" text-anchor="middle" font-size="16" font-weight="600" fill="#0a2e5c" font-family="PingFang SC, Microsoft YaHei, sans-serif">Web UI / REST API</text>
    <!-- Tooltip (simulated with a small popup on hover) – we'll add later -->
  </g>

  <!-- Layer 2: Core Engine -->
  <g transform="translate(400, 180)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="url(#glass)" stroke="#0a2e5c" stroke-width="1" filter="url(#shadow)"/>
    <text x="100" y="38" text-anchor="middle" font-size="16" font-weight="600" fill="#0a2e5c" font-family="PingFang SC, Microsoft YaHei, sans-serif">Core Router</text>
  </g>

  <!-- Layer 3: Memory System -->
  <g transform="translate(650, 240)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="url(#goldGrad)" stroke="#c9a84c" stroke-width="1" filter="url(#shadow)"/>
    <text x="100" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#0a2e5c" font-family="PingFang SC, Microsoft YaHei, sans-serif">记忆系统</text>
  </g>

  <!-- Layer 4: Inference Engine -->
  <g transform="translate(900, 300)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="url(#glass)" stroke="#0a2e5c" stroke-width="1" filter="url(#shadow)"/>
    <text x="100" y="38" text-anchor="middle" font-size="16" font-weight="600" fill="#0a2e5c" font-family="PingFang SC, Microsoft YaHei, sans-serif">推理引擎</text>
  </g>

  <!-- Connecting lines (arrows) -->
  <line x1="350" y1="150" x2="400" y2="210" stroke="#0a2e5c" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>
  <line x1="600" y1="210" x2="650" y2="270" stroke="#0a2e5c" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>
  <line x1="850" y1="270" x2="900" y2="330" stroke="#0a2e5c" stroke-width="2" stroke-dasharray="6,3" opacity="0.4"/>

  <!-- Subtext (icons) -->
  <text x="80" y="500" font-size="14" fill="#5a5a7a" font-family="PingFang SC, Microsoft YaHei, sans-serif">◆ 数据主权  ◆ 信创合规  ◆ 国密加密  ◆ 全链路审计</text>

</svg>
</body>
</html>
