<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrownStar – 企业级主权AI平台</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js">
    </script>

    <style>
        /* ============================================================
               RESET & BASE
               ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a2e5c;
            --primary-light: #1a4a7a;
            --gold: #c9a84c;
            --gold-hover: #dbb95e;
            --text: #1a1a2e;
            --text-secondary: #5a5a7a;
            --text-muted: #8a8aaa;
            --border: #e8ecf0;
            --bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.04);
            --radius: 12px;
            --font-sans: 'Inter', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
            --font-math: 'Latin Modern Math', 'STIX Two Math', serif;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 15px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        /* ============================================================
               APP LAYOUT (Flex column, full height)
               ============================================================ */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg);
            overflow: hidden;
        }

        /* ============================================================
               HEADER
               ============================================================ */
        .header {
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 1.8rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            min-height: 60px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .logo span {
            color: var(--gold);
        }
        .logo-badge {
            font-size: 0.55rem;
            font-weight: 500;
            background: var(--gold);
            color: #fff;
            padding: 0.1rem 0.5rem;
            border-radius: 12px;
            letter-spacing: 0.05em;
            margin-left: 0.3rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .tier-selector {
            display: flex;
            background: #f0f2f5;
            border-radius: 20px;
            padding: 0.15rem;
            border: 1px solid var(--border);
        }
        .tier-selector button {
            background: transparent;
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 18px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .tier-selector button.active {
            background: var(--primary);
            color: #fff;
        }
        .tier-selector button:hover:not(.active) {
            background: rgba(10, 46, 92, 0.06);
        }

        .license-status {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .license-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .license-status .dot.free {
            background: #8a8aaa;
        }
        .license-status .dot.paid {
            background: #4caf50;
        }
        .license-status .dot.invalid {
            background: #f44336;
        }

        /* ============================================================
               MAIN CHAT AREA (flex:1, scrollable)
               ============================================================ */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem 1rem 2rem;
            background: var(--bg);
            scroll-behavior: smooth;
            min-height: 0;
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #d0d4da;
            border-radius: 4px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #b0b4ba;
        }

        .message {
            max-width: 900px;
            margin: 0 auto 1.2rem auto;
            padding: 0.2rem 0;
            animation: fadeIn 0.2s ease-out;
        }
        .message .role {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .message .role .user-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 0.5rem;
            text-align: center;
            line-height: 16px;
            font-weight: 700;
        }
        .message .role .assistant-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--gold);
            color: #fff;
            font-size: 0.5rem;
            text-align: center;
            line-height: 16px;
            font-weight: 700;
        }
        .message .content {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text);
            padding-left: 0.2rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        /* Code blocks */
        .message .content pre {
            background: #f5f7fa;
            border-radius: 8px;
            padding: 1rem 1.2rem;
            margin: 0.5rem 0 1rem 0;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            line-height: 1.6;
            border: 1px solid var(--border);
        }
        .message .content pre code {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            background: transparent;
            padding: 0;
        }
        .message .content code {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            background: #f0f2f5;
            padding: 0.05rem 0.35rem;
            border-radius: 4px;
        }

        /* Math */
        .message .content .math-block {
            margin: 0.5rem 0 0.8rem 0;
            padding: 0.3rem 0;
            font-family: var(--font-math);
            font-size: 1.05rem;
        }
        .message .content mjx-container {
            font-family: var(--font-math) !important;
        }

        /* Inline math */
        .message .content .math-inline {
            font-family: var(--font-math);
        }

        /* Chinese text */
        .message .content .zh {
            font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* International text */
        .message .content .en {
            font-family: 'Inter', sans-serif;
        }

        /* Typing indicator */
        .typing-indicator {
            max-width: 900px;
            margin: 0 auto 1.2rem auto;
            padding: 0.2rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
            animation: pulse 1.2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        /* Fade in */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
               INPUT AREA (fixed at bottom)
               ============================================================ */
        .input-area {
            flex-shrink: 0;
            border-top: 1px solid var(--border);
            background: var(--bg);
            padding: 0.8rem 2rem 1.2rem 2rem;
        }

        .input-row {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            background: #f5f7fa;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: flex-end;
            padding: 0.1rem 0.1rem 0.1rem 1rem;
        }
        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(10, 46, 92, 0.08);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.7rem 0;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text);
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 200px;
        }
        .input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .input-wrapper .send-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 0.6rem 1.6rem;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            min-height: 44px;
            margin: 0.2rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .input-wrapper .send-btn:hover {
            background: var(--primary-light);
        }
        .input-wrapper .send-btn:active {
            transform: scale(0.97);
        }
        .input-wrapper .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================================
               CONTROLS BAR (above input)
               ============================================================ */
        .controls-bar {
            max-width: 900px;
            margin: 0 auto 0.6rem auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem 1.2rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .controls-bar .control-group {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .controls-bar .control-group label {
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
        }
        .controls-bar .control-group input[type="range"] {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            transition: background 0.2s;
        }
        .controls-bar .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
        }
        .controls-bar .control-group .value {
            font-weight: 600;
            color: var(--text);
            min-width: 2.2rem;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.75rem;
        }

        .controls-bar .module-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .controls-bar .module-toggles .mod-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.15rem 0.7rem;
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-sans);
        }
        .controls-bar .module-toggles .mod-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .controls-bar .module-toggles .mod-btn:hover:not(.active) {
            background: rgba(10, 46, 92, 0.05);
        }

        .controls-bar .clear-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            font-family: var(--font-sans);
            text-decoration: underline;
            padding: 0.1rem 0.3rem;
            transition: color 0.2s;
        }
        .controls-bar .clear-btn:hover {
            color: var(--text-secondary);
        }

        /* ============================================================
               MODAL (for settings / tier features)
               ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--bg);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            max-width: 560px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
            animation: modalFade 0.25s ease-out;
        }
        @keyframes modalFade {
            0% {
                opacity: 0;
                transform: scale(0.96) translateY(10px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.3rem;
        }
        .modal .sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
        }
        .modal .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.4rem 1rem;
            margin: 1rem 0;
        }
        .modal .feature-grid .item {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .modal .feature-grid .item .check {
            color: #4caf50;
        }
        .modal .feature-grid .item .cross {
            color: #e0e0e0;
        }
        .modal .modal-close {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.5rem 2rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 1rem;
            font-family: var(--font-sans);
            transition: background 0.2s;
        }
        .modal .modal-close:hover {
            background: var(--primary-light);
        }

        /* ============================================================
               RESPONSIVE
               ============================================================ */
        @media (max-width: 768px) {
            .header {
                padding: 0.4rem 1rem;
                flex-wrap: wrap;
                gap: 0.3rem;
            }
            .logo {
                font-size: 1.1rem;
            }
            .header-controls {
                gap: 0.6rem;
                flex-wrap: wrap;
            }
            .tier-selector button {
                padding: 0.2rem 0.6rem;
                font-size: 0.6rem;
            }
            .chat-container {
                padding: 1rem 1rem 0.5rem 1rem;
            }
            .input-area {
                padding: 0.5rem 1rem 1rem 1rem;
            }
            .controls-bar {
                font-size: 0.65rem;
                gap: 0.4rem 0.8rem;
            }
            .controls-bar .control-group input[type="range"] {
                width: 50px;
            }
            .message .content {
                font-size: 0.9rem;
            }
            .modal {
                padding: 1.5rem;
            }
            .modal .feature-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 0.4rem;
            }
            .header-controls {
                justify-content: space-between;
            }
            .input-row {
                flex-direction: column;
                gap: 0.4rem;
            }
            .input-wrapper textarea {
                font-size: 0.9rem;
            }
            .input-wrapper .send-btn {
                width: 100%;
                justify-content: center;
            }
            .controls-bar .module-toggles .mod-btn {
                font-size: 0.5rem;
                padding: 0.1rem 0.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- ============================================================
        HEADER
        ============================================================ -->
        <header class="header">
            <div class="logo">
                Crown<span>Star</span>
                <span class="logo-badge">v7.0</span>
            </div>
            <div class="header-controls">
                <div class="tier-selector" id="tierSelector">
                    <button data-tier="free" class="active">Free</button>
                    <button data-tier="basic">Basic</button>
                    <button data-tier="pro">Pro</button>
                    <button data-tier="enterprise">Enterprise</button>
                </div>
                <div class="license-status" id="licenseStatus">
                    <span class="dot free" id="licenseDot"></span>
                    <span id="licenseLabel">Free</span>
                </div>
                <button style="background:transparent;border:none;font-size:1.1rem;cursor:pointer;color:var(--text-secondary);" id="settingsBtn" title="Settings">⚙</button>
            </div>
        </header>

        <!-- ============================================================
        CHAT AREA
        ============================================================ -->
        <div class="chat-container" id="chatContainer">
            <div id="messageArea">
                <!-- Messages will be inserted here -->
                <div class="message">
                    <div class="role"><span class="assistant-icon">CS</span> CrownStar</div>
                    <div class="content">
                        欢迎使用 <strong>CrownStar</strong> 企业级主权AI平台。<br>
                        当前层: <strong id="welcomeTier">Free</strong>。<br>
                        输入您的问题开始对话。
                    </div>
                </div>
            </div>
            <div id="typingIndicator" class="typing-indicator" style="display:none;">
                CrownStar 正在思考...
            </div>
        </div>

        <!-- ============================================================
        CONTROLS BAR
        ============================================================ -->
        <div class="input-area">
            <div class="controls-bar" id="controlsBar">
                <div class="control-group">
                    <label>温度 τ</label>
                    <input type="range" id="tempSlider" min="0" max="2" step="0.05" value="0.7">
                    <span class="value" id="tempValue">0.70</span>
                </div>
                <div class="control-group">
                    <label>记忆 m</label>
                    <input type="range" id="memorySlider" min="1" max="20" step="1" value="5">
                    <span class="value" id="memoryValue">5</span>
                </div>
                <div class="control-group">
                    <label>长度 λ</label>
                    <input type="range" id="lengthSlider" min="10" max="4096" step="10" value="1024">
                    <span class="value" id="lengthValue">1024</span>
                </div>
                <div class="module-toggles" id="moduleToggles">
                    <button class="mod-btn" data-module="base_3layer_jacobian">3层</button>
                    <button class="mod-btn" data-module="hessian_backprop">Hessian</button>
                    <button class="mod-btn" data-module="universal_approx">UAT</button>
                    <button class="mod-btn" data-module="gurney_3stage">Gurney</button>
                    <button class="mod-btn" data-module="yegnanarayana_tensor">Yegnan</button>
                    <button class="mod-btn" data-module="haykin_recursive">Haykin</button>
                    <button class="mod-btn" data-module="bishop_probabilistic">Bishop</button>
                    <button class="mod-btn" data-module="zurada_indexed">Zurada</button>
                    <button class="mod-btn" data-module="ultra_super_model">Ultra</button>
                </div>
                <button class="clear-btn" id="clearBtn">清空对话</button>
            </div>

            <div class="input-row">
                <div class="input-wrapper">
                    <textarea id="inputArea" rows="1" placeholder="输入您的问题... (Shift+Enter 换行)" spellcheck="false"></textarea>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>
            </div>
        </div>

        <!-- ============================================================
        SETTINGS MODAL
        ============================================================ -->
        <div class="modal-overlay" id="settingsModal">
            <div class="modal">
                <h2>⚙ 设置与层级功能</h2>
                <div class="sub" id="modalTierInfo">当前层: <strong>Free</strong></div>
                <div class="feature-grid" id="featureGrid">
                    <!-- Filled by JS -->
                </div>
                <button class="modal-close" id="modalCloseBtn">关闭</button>
            </div>
        </div>

    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function() {

            'use strict';

            // ----------------------------------------------------------
            // 1. STATE
            // ----------------------------------------------------------
            const state = {
                tier: 'free',
                messages: [],
                modules: {
                    base_3layer_jacobian: false,
                    hessian_backprop: false,
                    universal_approx: false,
                    gurney_3stage: false,
                    yegnanarayana_tensor: false,
                    haykin_recursive: false,
                    bishop_probabilistic: false,
                    zurada_indexed: false,
                    ultra_super_model: false
                },
                temperature: 0.7,
                memory: 5,
                maxLength: 1024,
                isWaiting: false
            };

            // ----------------------------------------------------------
            // 2. TIER FEATURES
            // ----------------------------------------------------------
            const tierFeatures = {
                free: {
                    label: 'Free',
                    features: [
                        { name: '无限对话', available: true },
                        { name: '9 个数学模块', available: true },
                        { name: '记忆系统 (5窗口)', available: true },
                        { name: '单用户', available: true },
                        { name: '本地 SQLite', available: true },
                        { name: 'Web UI', available: true },
                        { name: 'REST API (只读)', available: false },
                        { name: '对话历史导出', available: false },
                        { name: '邮件提醒', available: false },
                        { name: '成本追踪', available: false },
                        { name: '多租户 RLS', available: false },
                        { name: 'vLLM 推理', available: false },
                        { name: '分析仪表板', available: false },
                        { name: '源码授权', available: false },

            // ----------------------------------------------------------
            // 3. DOM REFS
            // ----------------------------------------------------------
            const chatContainer = document.getElementById('chatContainer');
            const messageArea = document.getElementById('messageArea');
            const typingIndicator = document.getElementById('typingIndicator');
            const inputArea = document.getElementById('inputArea');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const tempSlider = document.getElementById('tempSlider');
            const tempValue = document.getElementById('tempValue');
            const memorySlider = document.getElementById('memorySlider');
            const memoryValue = document.getElementById('memoryValue');
            const lengthSlider = document.getElementById('lengthSlider');
            const lengthValue = document.getElementById('lengthValue');
            const tierSelector = document.getElementById('tierSelector');
            const licenseDot = document.getElementById('licenseDot');
            const licenseLabel = document.getElementById('licenseLabel');
            const welcomeTier = document.getElementById('welcomeTier');
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const modalTierInfo = document.getElementById('modalTierInfo');
            const featureGrid = document.getElementById('featureGrid');
            const moduleToggles = document.getElementById('moduleToggles');

            // ----------------------------------------------------------
            // 4. UI HELPERS
            // ----------------------------------------------------------
            function updateLicenseStatus() {
                const tier = state.tier;
                if (tier === 'free') {
                    licenseDot.className = 'dot free';
                    licenseLabel.textContent = 'Free';
                } else {
                    licenseDot.className = 'dot paid';
                    licenseLabel.textContent = tier.toUpperCase();
                }
                welcomeTier.textContent = tierFeatures[tier].label;
            }

            function updateTierButtons() {
                const btns = tierSelector.querySelectorAll('button');
                btns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tier === state.tier);
                });
            }

            function updateModuleButtons() {
                const btns = moduleToggles.querySelectorAll('.mod-btn');
                btns.forEach(btn => {
                    const mod = btn.dataset.module;
                    btn.classList.toggle('active', state.modules[mod] === true);
                });
            }

            function updateSliders() {
                tempValue.textContent = state.temperature.toFixed(2);
                memoryValue.textContent = state.memory;
                lengthValue.textContent = state.maxLength;
                tempSlider.value = state.temperature;
                memorySlider.value = state.memory;
                lengthSlider.value = state.maxLength;
            }

            function renderFeatureGrid() {
                const tier = state.tier;
                const data = tierFeatures[tier];
                if (!data) return;
                modalTierInfo.textContent = `当前层: ${data.label}`;
                featureGrid.innerHTML = '';
                data.features.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    const icon = f.available ? '✅' : '⛔';
                    const color = f.available ? 'check' : 'cross';
                    div.innerHTML = `<span class="${color}">${icon}</span> ${f.name}`;
                    featureGrid.appendChild(div);
                });
            }

            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            // ----------------------------------------------------------
            // 5. MESSAGE MANAGEMENT
            // ----------------------------------------------------------
            function addMessage(role, content) {
                const div = document.createElement('div');
                div.className = 'message';
                const icon = role === 'user' ? 'U' : 'CS';
                const iconClass = role === 'user' ? 'user-icon' : 'assistant-icon';
                const roleLabel = role === 'user' ? 'You' : 'CrownStar';
                div.innerHTML = `
                    <div class="role"><span class="${iconClass}">${icon}</span> ${roleLabel}</div>
                    <div class="content">${content}</div>
                `;
                messageArea.appendChild(div);
                state.messages.push({ role, content });
                scrollToBottom();
            }

            function showTyping() {
                typingIndicator.style.display = 'block';
                scrollToBottom();
            }

            function hideTyping() {
                typingIndicator.style.display = 'none';
            }

            function clearMessages() {
                messageArea.innerHTML = '';
                state.messages = [];
                // Re-add welcome
                const welcome = document.createElement('div');
                welcome.className = 'message';
                welcome.innerHTML = `
                    <div class="role"><span class="assistant-icon">CS</span> CrownStar</div>
                    <div class="content">
                        欢迎使用 <strong>CrownStar</strong> 企业级主权AI平台。<br>
                        当前层: <strong id="welcomeTier">${tierFeatures[state.tier].label}</strong>。<br>
                        输入您的问题开始对话。
                    </div>
                `;
                messageArea.appendChild(welcome);
                scrollToBottom();
            }

            // ----------------------------------------------------------
            // 6. SEND MESSAGE (SIMULATED – connect to your backend)
            // ----------------------------------------------------------
            function sendMessage() {
                const text = inputArea.value.trim();
                if (!text || state.isWaiting) return;

                // Check tier limits (Free: 100 messages/day simulation)
                // In real implementation, check with backend

                addMessage('user', text);
                inputArea.value = '';
                inputArea.style.height = 'auto';

                state.isWaiting = true;
                sendBtn.disabled = true;
                showTyping();

                // Build modules list
                const activeModules = Object.keys(state.modules).filter(k => state.modules[k]);

                // Build payload
                const payload = {
                    prompt: text,
                    tier: state.tier,
                    temperature: state.temperature,
                    memory: state.memory,
                    max_tokens: state.maxLength,
                    modules: activeModules
                };

                // SIMULATE response (replace with actual API call)
                setTimeout(() => {
                    hideTyping();
                    state.isWaiting = false;
                    sendBtn.disabled = false;

                    // Generate a realistic response based on tier
                    const tierLabel = tierFeatures[state.tier].label;
                    const moduleStr = activeModules.length ? ` (模块: ${activeModules.join(', ')})` : '';
                    const response = `
                        <strong>${tierLabel} 层级响应</strong>
                        <br><br>
                        您的问题是: <em>${text}</em>
                        <br><br>
                        当前温度: <strong>${state.temperature}</strong>，
                        记忆窗口: <strong>${state.memory}</strong>，
                        最大长度: <strong>${state.maxLength}</strong>
                        ${moduleStr}
                        <br><br>
                        <span class="zh">这是 CrownStar 的模拟响应。在生产环境中，此响应将来自 DeepSeek 或您选择的其他语言模型。</span>
                        <br><br>
                        数学示例: <span class="math-inline">\( J(x) = D^{(L)} W^{(L)} \cdots D^{(1)} W^{(1)} \)</span>
                        <br><br>
                        代码示例:
                        <pre><code class="language-python">def hello():
                            print("CrownStar 企业级AI平台")
                            return 42</code></pre>
                        <br>
                        <span class="en">This is a professional enterprise-grade response.</span>
                    `;

                    // Re-run MathJax after inserting
                    addMessage('assistant', response);
                    if (window.MathJax) {
                        MathJax.typesetPromise();
                    }

                    // Auto-scroll after MathJax renders
                    setTimeout(scrollToBottom, 100);

                }, 800 + Math.random() * 600);
            }

            // ----------------------------------------------------------
            // 7. EVENT BINDING
            // ----------------------------------------------------------

            // Send
            sendBtn.addEventListener('click', sendMessage);
            inputArea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Auto-resize textarea
            inputArea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            // Clear
            clearBtn.addEventListener('click', function() {
                if (state.messages.length === 0) return;
                if (confirm('确定要清空所有对话吗？')) {
                    clearMessages();
                }
            });

            // Sliders
            tempSlider.addEventListener('input', function() {
                state.temperature = parseFloat(this.value);
                tempValue.textContent = state.temperature.toFixed(2);
            });
            memorySlider.addEventListener('input', function() {
                state.memory = parseInt(this.value);
                memoryValue.textContent = state.memory;
            });
            lengthSlider.addEventListener('input', function() {
                state.maxLength = parseInt(this.value);
                lengthValue.textContent = state.maxLength;
            });

            // Tier selector
            tierSelector.addEventListener('click', function(e) {
                const btn = e.target.closest('button');
                if (!btn) return;
                const tier = btn.dataset.tier;
                if (tier === state.tier) return;
                state.tier = tier;
                updateTierButtons();
                updateLicenseStatus();
                renderFeatureGrid();
                // Update welcome message tier
                const welcome = messageArea.querySelector('.message:first-child');
                if (welcome) {
                    const tierSpan = welcome.querySelector('#welcomeTier');
                    if (tierSpan) tierSpan.textContent = tierFeatures[tier].label;
                }
                // Adjust controls based on tier
                if (tier === 'free') {
                    // Free: limited memory
                    memorySlider.max = 5;
                    if (state.memory > 5) { state.memory = 5;
                        memorySlider.value = 5;
                        memoryValue.textContent = '5'; }
                } else if (tier === 'basic') {
                    memorySlider.max = 20;
                } else if (tier === 'pro') {
                    memorySlider.max = 100;
                } else if (tier === 'enterprise') {
                    memorySlider.max = 500;
                }
                // Add system message
                addMessage('assistant', `切换到 <strong>${tierFeatures[tier].label}</strong> 层级。${tier === 'free' ? '免费版永久免费。' : '已解锁全部功能。'}`);
            });

            // Module toggles
            moduleToggles.addEventListener('click', function(e) {
                const btn = e.target.closest('.mod-btn');
                if (!btn) return;
                const mod = btn.dataset.module;
                state.modules[mod] = !state.modules[mod];
                btn.classList.toggle('active', state.modules[mod]);
                // If not active in free, allow toggle but show note
                if (state.tier === 'free') {
                    // Free can toggle but only some modules work
                    // Just visual
                }
            });

            // Settings modal
            settingsBtn.addEventListener('click', function() {
                renderFeatureGrid();
                settingsModal.classList.add('open');
            });
            modalCloseBtn.addEventListener('click', function() {
                settingsModal.classList.remove('open');
            });
            settingsModal.addEventListener('click', function(e) {
                if (e.target === this) settingsModal.classList.remove('open');
            });

            // ----------------------------------------------------------
            // 8. INIT
            // ----------------------------------------------------------
            updateLicenseStatus();
            updateTierButtons();
            updateModuleButtons();
            updateSliders();
            renderFeatureGrid();

            // Focus input
            inputArea.focus();

            console.log('CrownStar UI initialized.');
            console.log('Tier:', state.tier);
            console.log('Modules:', state.modules);
            console.log('Memory:', state.memory);
            console.log('Temperature:', state.temperature);

        })();
