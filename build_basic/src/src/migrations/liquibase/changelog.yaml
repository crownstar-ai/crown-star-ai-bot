# src/migrations/liquibase/changelog.yaml
databaseChangeLog:
  - changeSet:
      id: 1
      author: crownstar
      changes:
        - createTable:
            tableName: conversations
            columns:
              - column: { name: id, type: int, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: timestamp, type: datetime, constraints: { nullable: false } }
              - column: { name: user_id, type: varchar(255), constraints: { nullable: false } }
              - column: { name: user_message, type: clob, constraints: { nullable: false } }
              - column: { name: assistant_message, type: clob, constraints: { nullable: false } }
              - column: { name: modules_active, type: clob }
              - column: { name: language_model, type: varchar(255) }
              - column: { name: latency_ms, type: int }
              - column: { name: tenant_id, type: varchar(255) }
        - createIndex:
            indexName: idx_conversations_user
            tableName: conversations
            columns: [ user_id ]
        - createIndex:
            indexName: idx_conversations_timestamp
            tableName: conversations
            columns: [ timestamp ]
        - createTable:
            tableName: users
            columns:
              - column: { name: user_id, type: varchar(255), constraints: { primaryKey: true } }
              - column: { name: username, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: email, type: varchar(255), constraints: { nullable: false, unique: true } }
              - column: { name: tier, type: varchar(50), constraints: { nullable: false } }
              - column: { name: created_at, type: datetime, constraints: { nullable: false } }
      rollback:
        - dropTable: { tableName: conversations }
        - dropTable: { tableName: users }
  - changeSet:
      id: 2
      author: crownstar
      changes:
        - addColumn:
            tableName: conversations
            columns:
              - column: { name: cost_usd, type: decimal(10,6), defaultValue: 0 }
        - sql: "UPDATE conversations SET cost_usd = 0 WHERE cost_usd IS NULL;"
      rollback:
        - dropColumn: { tableName: conversations, columnName: cost_usd }
