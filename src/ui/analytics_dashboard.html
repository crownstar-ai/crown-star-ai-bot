<!DOCTYPE html>
<html>
<head>
    <title>CrownStar Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #0a0f2a; color: #f0e6ff; }
        .container { max-width: 1200px; margin: auto; }
        h1 { color: #ffcc4d; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #1e293b; border-radius: 10px; padding: 20px; border-left: 4px solid #ffcc4d; }
        canvas { max-height: 300px; }
        select, button { background: #ffcc4d; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; margin: 10px 0; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; padding: 15px; border-radius: 10px; flex: 1; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #ffcc4d; }
    </style>
</head>
<body>
<div class="container">
    <h1>⭐ CrownStar Analytics Dashboard</h1>
    <div class="stats" id="stats"></div>
    <div class="chart-grid">
        <div class="card"><h3>Requests by Tier</h3><canvas id="tierChart"></canvas></div>
        <div class="card"><h3>Requests by Model</h3><canvas id="modelChart"></canvas></div>
        <div class="card"><h3>Cost Over Time</h3><canvas id="costChart"></canvas></div>
        <div class="card"><h3>Module Popularity</h3><canvas id="moduleChart"></canvas></div>
    </div>
    <div>
        <label>Start Date: <input type="date" id="startDate"></label>
        <label>End Date: <input type="date" id="endDate"></label>
        <button onclick="loadData()">Refresh</button>
        <button onclick="downloadReport('csv')">Export CSV</button>
        <button onclick="downloadReport('json')">Export JSON</button>
    </div>
</div>
<script>
    let tierChart, modelChart, costChart, moduleChart;
    
    async function loadData() {
        const start = document.getElementById('startDate').value || '';
        const end = document.getElementById('endDate').value || '';
        const params = new URLSearchParams();
        if (start) params.append('start_date', start);
        if (end) params.append('end_date', end);
        
        const summaryRes = await fetch(`/v1/analytics/usage/summary?${params}`);
        const summary = await summaryRes.json();
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="stat-value">${summary.total_requests}</div><div>Requests</div></div>
            <div class="stat-card"><div class="stat-value">${(summary.total_cost || 0).toFixed(2)}</div><div>Cost (USD)</div></div>
            <div class="stat-card"><div class="stat-value">${summary.avg_latency_ms?.toFixed(0) || 0}</div><div>Avg Latency (ms)</div></div>
            <div class="stat-card"><div class="stat-value">${summary.unique_users || 0}</div><div>Unique Users</div></div>
        `;
        
        const tierRes = await fetch(`/v1/analytics/usage/by-tier?${params}`);
        const tierData = await tierRes.json();
        if (tierChart) tierChart.destroy();
        tierChart = new Chart(document.getElementById('tierChart'), {
            type: 'bar', data: { labels: Object.keys(tierData), datasets: [{ label: 'Requests', data: Object.values(tierData).map(v=>v.requests), backgroundColor: '#ffcc4d' }] }
        });
        
        const modelRes = await fetch(`/v1/analytics/usage/by-model?${params}`);
        const modelData = await modelRes.json();
        const modelLabels = Object.keys(modelData).slice(0, 5);
        const modelCounts = modelLabels.map(m => modelData[m].requests);
        if (modelChart) modelChart.destroy();
        modelChart = new Chart(document.getElementById('modelChart'), {
            type: 'pie', data: { labels: modelLabels, datasets: [{ data: modelCounts, backgroundColor: ['#ffcc4d','#3b82f6','#10b981','#ef4444','#8b5cf6'] }] }
        });
        
        const moduleRes = await fetch(`/v1/analytics/usage/modules?${params}`);
        const moduleData = await moduleRes.json();
        const moduleLabels = Object.keys(moduleData);
        const moduleEnabled = moduleLabels.map(m => moduleData[m]?.enabled || 0);
        if (moduleChart) moduleChart.destroy();
        moduleChart = new Chart(document.getElementById('moduleChart'), {
            type: 'bar', data: { labels: moduleLabels.map(l=>l.replace(/_/g,' ').substring(0,15)), datasets: [{ label: 'Toggles (Enabled)', data: moduleEnabled, backgroundColor: '#10b981' }] }
        });
    }
    
    async function downloadReport(format) {
        const start = document.getElementById('startDate').value || '';
        const end = document.getElementById('endDate').value || '';
        const response = await fetch('/v1/analytics/report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ start_date: start, end_date: end, format: format })
        });
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `report.${format}`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    // Set default dates (last 30 days)
    const today = new Date();
    const thirtyDaysAgo = new Date(today);
    thirtyDaysAgo.setDate(today.getDate() - 30);
    document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    loadData();
</script>
</body>
</html>
