version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: crownstar-postgres
    environment:
      POSTGRES_USER: \
      POSTGRES_PASSWORD: \
      POSTGRES_DB: \
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crownstar-net

  redis:
    image: redis:7-alpine
    container_name: crownstar-redis
    command: redis-server --appendonly yes --requirepass \
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crownstar-net

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: crownstar/app:latest
    container_name: crownstar-app
    environment:
      DATABASE_URL: postgresql://\:\@postgres:5432/\
      REDIS_URL: redis://:\@redis:6379/0
      LICENSE_SECRET: \
      CROWNSTAR_LICENSE_KEY: \
      SECRET_KEY: \
      ENVIRONMENT: production
      DEFAULT_TEMPERATURE: 0.7
      DEFAULT_MIN_LENGTH: 10
      DEFAULT_MAX_LENGTH: 2048
      MEMORY_WINDOW: 5
      DEEPSEEK_API_KEY: \
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - crownstar-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  crownstar-net:
    driver: bridge
